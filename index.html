<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bingo Madness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- LOBBY VIEW -->
    <div id="lobby-view" class="view active">
      <div class="lobby-card">
        <div class="lobby-header">
          <h1>Bing<span class="lobby-o">o</span><br />Madness</h1>
          <p class="tagline">Mark. Match. Win.</p>
        </div>
        <div class="lobby-body">
          <input
            type="text"
            id="roomCodeInput"
            placeholder="Room code"
            autocomplete="off"
            autocapitalize="characters"
          />
          <input type="text" id="playerNameInput" placeholder="Your name" autocomplete="off" />

          <div class="lobby-row">
            <button id="joinRoom" class="button-6">Join Room</button>
            <button id="createRoom" class="button-6">Create Room</button>
          </div>
        </div>
      </div>
    </div>

    <!-- GAME VIEW -->
    <div id="game-view" class="view">
      <div class="main-container">
        <header class="app-header">
          <div class="header-title">
            <h1>Bingo Madness</h1>
            <p class="tagline">Mark. Match. Win.</p>
          </div>
          <div class="header-meta">
            <div class="room-code-wrap">
              <div id="roomCodeDisplay">&mdash;</div>
              <button id="copyRoomCode" class="copy-btn" title="Copy room code">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
              </button>
            </div>
            <div id="gameStatus" data-status="waiting">Waiting</div>
          </div>
          <div class="header-right">
            <div id="playerCount">0/10</div>
            <button id="leaveRoom" class="button-6">Leave</button>
          </div>
        </header>

        <div class="players-strip" id="playersStrip" aria-label="Players in room"></div>

        <div class="game-container">
          <div class="bingo-table-wrap">
            <div class="board-column">
              <div class="board-frame">
                <table id="bingoTable"></table>
              </div>
              <div class="winner-banner" id="winnerBanner">
                <span>Winner:</span>
                <strong id="winnerName">No winner yet</strong>
              </div>
              <div id="commentaryBar" class="commentary-bar"></div>
              <div class="avatar-arena" id="avatarArena">
                <canvas id="fateArenaCanvas" style="display:block;width:100%;border-radius:4px;"></canvas>
              </div>
            </div>
          </div>
          <div class="column2">
            <div id="playerName">Name: &mdash;</div>
            <div class="called-numbers">
              <span>Called Numbers</span>
              <div id="calledNumbersList"></div>
            </div>
            <div class="roll-display" id="rollDisplay">
              <span>Current Roll</span>
              <div class="roll-reel">
                <div id="rollNumber">--</div>
              </div>
              <p id="rollStatus">Waiting for host</p>
            </div>
            <button id="playerReset" class="button-6">Reset Board</button>
            <p class="reset-hint">Shuffle your numbers</p>
          </div>
        </div>

        <!-- Caller section - shown automatically when you are the host -->
        <div class="caller-container">
          <div class="sheet-handle-bar">
            <div class="sheet-handle"></div>
            <button id="callerSheetClose" class="sheet-close">&#x2715;</button>
          </div>
          <div class="caller-inner">
            <span class="caller-section-label caller-headline">Game Control</span>
            <div class="caller-row">
              <div id="callerControls">
                <div id="transferHostSection">
                  <h3>Transfer Host</h3>
                  <div class="transfer-row">
                    <select id="transferHostSelect" class="transfer-select">
                      <option value="">Hand off to...</option>
                    </select>
                    <button id="transferHostBtn" class="button-6">Hand Off</button>
                  </div>
                </div>
              </div>
              <div class="caller-actions">
                <button id="rollNumberBtn" class="button-6">Roll Number</button>
                <div class="caller-game-btns">
                  <button id="startGame" class="button-6">Start Game</button>
                  <button id="reset" class="button-6">Reset Game</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Mobile roll FAB (host only) -->
    <button id="rollFab" class="roll-fab" title="Roll Number">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor" stroke="none">
        <rect x="1.5" y="1.5" width="17" height="17" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
        <circle cx="6" cy="6" r="1.5"/><circle cx="14" cy="6" r="1.5"/>
        <circle cx="10" cy="10" r="1.5"/>
        <circle cx="6" cy="14" r="1.5"/><circle cx="14" cy="14" r="1.5"/>
      </svg>
    </button>

    <!-- Mobile host FAB -->
    <button id="callerFab" class="caller-fab" title="Game Controls">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <div id="callerBackdrop" class="caller-backdrop"></div>

    <div id="dialogOverlay" class="dialog-overlay" aria-hidden="true">
      <div
        class="dialog-box"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dialogTitle"
        aria-describedby="dialogMessage"
      >
        <div class="dialog-header">
          <h2 id="dialogTitle">Notice</h2>
        </div>
        <p id="dialogMessage"></p>
        <div class="dialog-actions">
          <button id="dialogCancel" class="button-6" type="button">No</button>
          <button id="dialogConfirm" class="button-6" type="button">OK</button>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="api.js"></script>
    <script src="dialog.js"></script>
    <script src="fate-sandbox.js"></script>
    <script src="bingo.js"></script>
    <script src="numberboard.js"></script>
    <script src="confetti.js"></script>
  </body>
</html>
