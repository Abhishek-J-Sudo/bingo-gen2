<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Generator (1-25)</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-direction: column;
            /*padding-bottom: 100px;*/
            margin: 0px;
            background-color: rgb(74 95 112);
            color: #e0e0e0;

        }
        h1,h2,h3{
            margin: 10px;
        }
        .marked { 
            background-color: red; 
            color: white; 
            text-decoration: line-through; 
        }
        .called-numbers {
            display: flex;
            flex-direction: column;
            border: 1px solid #94d3b6;
            padding: 10px;
            margin-bottom: 20px;
            max-width: 200px;
            min-width: 200px;
            height: 175px;
            background-color: #083e401c;
        }

        #calledNumbersList {
            display: flex;
            flex-wrap: wrap; /* Allows elements to wrap */
            flex-direction: row; /* Ensures horizontal layout */
            max-width: 200px;
            gap: 5px; /* Adds space between items */
        }

        .called-numbers div {
            flex: 1 1 calc(20% - 10px); /* Makes sure 5 items fit in one row */
            max-width: calc(20% - 10px); /* Limits max width to ensure 5 per row */
            text-align: center;
            max-height: fit-content;
        }

        .game-container {
            display: flex;
            justify-content: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #efefef;
        }

        .lock-section {
            display: flex;
            column-gap: 10px;
        }
        #numberInput, #lockKey {
            width: 150px;
            margin-right: 10px;
        }

        /* CSS */
        .button-6 {
          align-items: center;
          background-color: #efefef;
          border: 1px solid rgba(0, 0, 0, 0.1);
          border-radius: .25rem;
          box-shadow: rgba(0, 0, 0, 0.05) 0 5px 10px 5px;
          box-sizing: border-box;
          color: rgba(255, 255, 255, 0.85);
          cursor: pointer;
          display: inline-flex;
          font-family: system-ui,-apple-system,system-ui,"Helvetica Neue",Helvetica,Arial,sans-serif;
          font-size: 16px;
          font-weight: 600;
          justify-content: center;
          line-height: 1.25;
          margin: 0;
          min-height: 3rem;
          padding: calc(.875rem - 1px) calc(1.5rem - 1px);
          position: relative;
          text-decoration: none;
          transition: all 250ms;
          user-select: none;
          -webkit-user-select: none;
          touch-action: manipulation;
          vertical-align: baseline;
          width: 30px;
          margin-top: auto;
          margin-right: 20px;
        }

        .button-6:hover,
        .button-6:focus {
          border-color: rgba(0, 0, 0, 0.15);
          box-shadow: rgba(0, 0, 0, 0.20) 0 4px 12px;
          color: rgba(0, 0, 0, 0.65);
        }

        .button-6:hover {
          transform: translateY(-1px);
        }

        .button-6:active {
          background-color: #F0F0F1;
          border-color: rgba(0, 0, 0, 0.15);
          box-shadow: rgba(0, 0, 0, 0.06) 0 2px 4px;
          color: rgba(0, 0, 0, 0.65);
          transform: translateY(0);
        }
        td {
            width: 50px;
            height: 50px;
            border: 1px solid #94d3b6;
            text-align: center;
            vertical-align: middle;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        td:hover {
            background-color: #e0e0e0;
        }
        td.called {
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
        }
        td.disabled {
            background-color: #f0f0f0;
            color: #999;
            cursor: not-allowed;
        }
        #numberBoard td{
            height: 30px;
            width: 30px;
            color: #837f7f;
        }
        .column2{
            margin-left: 20px;
            text-align: left;
        }
        /* Add styles for player info and status displays */
        #playerCount, #gameStatus {
            margin: 10px 0;
            font-size: 14px;
        }
        /* Styles for caller controls */
        #callerControls {
            display: none;
            /* padding: 15px;
            border: 1px solid #94d3b6; */
            background-color: #275a5e17;
            flex-direction: row;
            width: 280px;
        }
        .winners-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 10px;
            border-top: 1px solid #eee;
            padding: 5px;
            font-size: 15px;
        }
        .game-locked #bingoTable td {
            cursor: not-allowed;
        }
        #reset{
            display: none;
            align-self: normal;
        }
        .main-container{
            width: 700px;
            margin: auto;
            background-color: #7d9db1;
            box-shadow: 0 0 100px rgb(0 200 255 / 60%);
        }
        .player-container{
            text-align: center;
        }
        .caller-container{
            /* display: none; */
            align-items: flex-start;
            flex-direction: row;
            gap: 10px;
            margin: 0px 20px 20px 20px;
            justify-content: center;
        }
        .unlock-section{
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            column-gap: 10px;
            text-align: center;
        }
        #bingoTable{
            background-color: #f0f0f0;
            color: #818181;
        }
        th{
            color: #7d9db1;
            /* color: #e0e0e0; */
        }
        .board{
            display: none;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="player-container">
            <h1 style="color: #fff; margin-bottom: 0px;">🎉 Bingo Madness 🎉</h1>
            <h4 style="color: #fff; margin: 0px;">🎯 Mark. Match. Win! 🎯</h4>
            <div id="gameStatus">Game is ready - you can reset your board</div>
            <div id="playerCount">Players: 0/10</div>
            
            <div class="game-container">
                <table id="bingoTable"></table>
                <div class="column2">
                    <div id="playerName" style="margin: 10px 0px;">NAME</div>
                    <div class="called-numbers">
                        <span style="color: #eeeeee; padding-bottom: 10px; border-bottom: 1px solid #efefef; margin-bottom: 10px;">Called Numbers</span>
                        <div id="calledNumbersList"></div>
                    </div>
                    <button id="playerReset" class="button-6" style="background-color: #67dde3ba;">Reset</button>
                </div>
            </div>
        </div>
        <div class="unlock-section">
            <span style="color: #424c69;">For Bingo caller only</span>
            <div class="lock-section" style="margin: auto; padding: 10px 0px">
                <input type="password" id="lockKey" placeholder="Enter Key">
                <button id="unlock" class="button-6" style="width: 100px!important; margin: 0px!important; padding: 0px!important; min-height: 2rem!important; background-color: #424c69; color: #e0e0e0;">Unlock</button>
            </div>
        </div>      
        <div class="caller-container">
            <!-- Add Caller Controls section -->
            <div id="callerControls">
                <button id="startGame" class="button-6" style="width: 120px!important; margin-right: 10px; margin-top: 0px!important; box-shadow: 0 0 100px rgb(0 200 255 / 60%);">Start Game</button>
                <div>
                    <h3>Winners</h3>
                    <div id="winnersList" class="winners-list">No winners yet</div>
                </div>
            </div>
            <div class="board">
                <table id="numberBoard" style="margin: auto;">
                    <tr>
                        <td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td></td><td></td><td></td>
                    </tr>
                     <tr>
                        <td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td><td>12</td><td>13</td><td>14</td><td>15</td>
                    </tr>
                     <tr>
                        <td>16</td><td>17</td><td>18</td><td>19</td><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td>
                    </tr>
                </table>
            </div>
            <button id="reset" style="background-color: #ff0b4cb8; color: #e0e0e0; width: 40px!important; margin: 0px!important; min-height: 2rem!important;" class="button-6">Reset</button>
        </div>
    </div>
    
    <script src="firebase-config.js"></script>
    <script type="module">
        // Import Firebase SDKs
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, remove, onValue, set, update, get, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.5.0/firebase-database.js";

        const requiredFirebaseConfigKeys = [
            "apiKey",
            "authDomain",
            "databaseURL",
            "projectId",
            "storageBucket",
            "messagingSenderId",
            "appId"
        ];

        function getFirebaseConfig() {
            const config = window.BINGO_FIREBASE_CONFIG;
            if (!config || typeof config !== "object") {
                throw new Error("Missing Firebase config. Create firebase-config.js from firebase-config.example.js.");
            }

            const missingKeys = requiredFirebaseConfigKeys.filter((key) => !config[key]);
            if (missingKeys.length) {
                throw new Error(`Firebase config is missing: ${missingKeys.join(", ")}`);
            }

            return config;
        }

        function initializeFirebase() {
            try {
                const firebaseConfig = getFirebaseConfig();

                const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
                const database = getDatabase(app);
                const bingoRef = ref(database, 'bingo-game');

                window.bingoRef = bingoRef;
                window.database = database;
                window.push = push;
                window.ref = ref;
                window.onChildAdded = onChildAdded;
                window.remove = remove;
                window.set = set;
                window.update = update;
                window.get = get;
                window.onValue = onValue;
                window.onDisconnect = onDisconnect;
                window.serverTimestamp = serverTimestamp;

                document.dispatchEvent(new Event("firebaseReady"));

            } catch (error) {
                console.error("Detailed Firebase Initialization Error:", error);
                alert(`Firebase Initialization Failed: ${error.message}`);
            }
        }

        initializeFirebase();
    </script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="bingo.js"></script>
    <script src="numberboard.js"></script>
    <script src="confetti.js"></script>
</body>
</html>
