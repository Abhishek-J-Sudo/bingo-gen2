<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stick Figure Physics Sandbox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 20px;
    }
    h1 { color: #FFE600; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }
    #arena { display: block; background: #f0ede4; border: 3px solid #111; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    button {
      background: #FFE600; color: #000; border: 2px solid #000;
      padding: 9px 16px; font: bold 10px/1 'Courier New';
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    }
    button:hover { background: #fff; }
    button.red { background: #e03030; color: #fff; border-color: #900; }
    button.red:hover { background: #ff4444; }
    button.orange { background: #ff8800; color: #fff; border-color: #c05500; }
    button.orange:hover { background: #ffaa33; }
    .hint { color: #555; font-size: 9px; letter-spacing: 2px; text-align: center; }
  </style>
</head>
<body>
  <h1>Stick Figure Physics Sandbox</h1>
  <canvas id="arena" width="700" height="360"></canvas>
  <div class="controls">
    <button id="btnHitSelf">Danger → ABHI ★</button>
    <button id="btnHitSam">Danger → SAM</button>
    <button id="btnHitMia">Danger → MIA</button>
    <button id="btnHitAll" class="orange">ALL MATCH</button>
    <button id="btnReact">React! (all)</button>
    <button id="btnReset">Reset All</button>
  </div>
  <p class="hint">Host (★) shoots on danger match — sequential if multiple players hit</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <script>
  (() => {
    const { Engine, Bodies, Body, World, Runner } = Matter;

    const engine = Engine.create({ gravity: { y: 2.2 } });
    Runner.run(Runner.create(), engine);

    const W = 700, H = 360, FLOOR_Y = 308;
    const floorBody = Bodies.rectangle(W / 2, FLOOR_Y + 30, W + 100, 60, { isStatic: true });
    World.add(engine.world, floorBody);

    const canvas = document.getElementById('arena');
    const ctx = canvas.getContext('2d');

    const LIMB_KEYS = ['arm-l', 'arm-r', 'head', 'leg-l', 'leg-r'];

    // ── Figure ────────────────────────────────────────────────────────────────
    function Figure(px, name, isHost) {
      this.baseX       = px;
      this.name        = name;
      this.isHost      = isHost;
      this.t           = Math.random() * Math.PI * 2;
      this.vy          = 0;
      this.dy          = 0;
      this.aimTarget   = null;   // { x, y } — where arm-r points
      this.aimElapsed  = 0;
      this.aimDuration = 0;
      this.hitFlash    = null;   // { elapsed, duration }
      this.muzzleFlash = null;   // { x, y, elapsed, duration }
      this.dropped     = new Set();
      this.physBodies  = {};
    }

    Figure.prototype.reset = function () {
      this.t           = Math.random() * Math.PI * 2;
      this.vy          = 0;
      this.dy          = 0;
      this.aimTarget   = null;
      this.hitFlash    = null;
      this.muzzleFlash = null;
      this.dropped.clear();
      this.physBodies  = {};
    };

    Figure.prototype.react = function () {
      if (!this.dropped.has('leg-l') && !this.dropped.has('leg-r')) this.vy = -135;
    };

    Figure.prototype.aimAt = function (tx, ty, duration) {
      this.aimTarget   = { x: tx, y: ty };
      this.aimElapsed  = 0;
      this.aimDuration = duration;
    };

    Figure.prototype.update = function (dt) {
      this.t += dt;
      if (this.dy < 0 || this.vy !== 0) {
        this.vy += 520 * dt;
        this.dy += this.vy * dt;
        if (this.dy >= 0) { this.dy = 0; this.vy = 0; }
      }
      if (this.aimTarget) {
        this.aimElapsed += dt * 1000;
        if (this.aimElapsed >= this.aimDuration) this.aimTarget = null;
      }
      if (this.hitFlash) {
        this.hitFlash.elapsed += dt * 1000;
        if (this.hitFlash.elapsed >= this.hitFlash.duration) this.hitFlash = null;
      }
      if (this.muzzleFlash) {
        this.muzzleFlash.elapsed += dt * 1000;
        if (this.muzzleFlash.elapsed >= this.muzzleFlash.duration) this.muzzleFlash = null;
      }
    };

    Figure.prototype.getPose = function () {
      const t  = this.t;
      const sw = Math.sin(t * 0.7) * 2.5;
      const bx = this.baseX + sw;
      const by = FLOOR_Y + this.dy;
      const as = Math.sin(t * 0.9) * 6;
      const ls = Math.sin(t * 0.6) * 5;

      const pose = {
        torso:  { x1: bx,      y1: by - 38, x2: bx,           y2: by - 78 },
        head:   { cx: bx,      cy: by - 89, r: 10 },
        'arm-l':{ x1: bx,      y1: by - 65, x2: bx - 18 + as, y2: by - 48 },
        'arm-r':{ x1: bx,      y1: by - 65, x2: bx + 18 - as, y2: by - 48 },
        'leg-l':{ x1: bx,      y1: by - 38, x2: bx - 12 - ls, y2: by },
        'leg-r':{ x1: bx,      y1: by - 38, x2: bx + 12 + ls, y2: by },
      };

      // Aim arm-r toward target when host is firing
      if (this.isHost && this.aimTarget && !this.dropped.has('arm-r')) {
        const sx = pose['arm-r'].x1, sy = pose['arm-r'].y1;
        const dx = this.aimTarget.x - sx, dy = this.aimTarget.y - sy;
        const d  = Math.hypot(dx, dy) || 1;
        pose['arm-r'].x2 = sx + (dx / d) * 22;
        pose['arm-r'].y2 = sy + (dy / d) * 22;
      }

      return pose;
    };

    Figure.prototype.dropLimb = function (key) {
      if (this.dropped.has(key)) return;
      this.dropped.add(key);

      const p = this.getPose();
      let body;

      if (key === 'head') {
        body = Bodies.circle(p.head.cx, p.head.cy, p.head.r, {
          restitution: 0.55, friction: 0.4, frictionAir: 0.01,
        });
        Body.setVelocity(body, { x: (Math.random() - 0.5) * 5, y: -5 });
      } else {
        const l   = p[key];
        const cx  = (l.x1 + l.x2) / 2;
        const cy  = (l.y1 + l.y2) / 2;
        const len = Math.hypot(l.x2 - l.x1, l.y2 - l.y1);
        const ang = Math.atan2(l.y2 - l.y1, l.x2 - l.x1);
        body = Bodies.rectangle(cx, cy, len, 5, {
          angle: ang, restitution: 0.4, friction: 0.3, frictionAir: 0.008,
        });
        body.limbLength = len;
        Body.setVelocity(body, {
          x: (Math.random() - 0.5) * 8,
          y: -(3 + Math.random() * 4),
        });
        Body.setAngularVelocity(body, (Math.random() - 0.5) * 0.45);
      }

      this.physBodies[key] = body;
      World.add(engine.world, body);
    };

    Figure.prototype.draw = function (ctx) {
      const p     = this.getPose();
      const flash = this.hitFlash && (this.hitFlash.elapsed / this.hitFlash.duration) < 0.6;
      const ink   = flash ? '#e03030' : '#1a1a1a';
      const fill  = flash ? '#ffcccc' : '#f0ede4';

      ctx.save();
      ctx.strokeStyle = ink;
      ctx.lineWidth   = 3;
      ctx.lineCap     = 'round';

      // Torso
      ctx.beginPath();
      ctx.moveTo(p.torso.x1, p.torso.y1);
      ctx.lineTo(p.torso.x2, p.torso.y2);
      ctx.stroke();

      // Limbs
      ['arm-l', 'arm-r', 'leg-l', 'leg-r'].forEach(k => {
        if (this.dropped.has(k)) return;
        ctx.beginPath();
        ctx.moveTo(p[k].x1, p[k].y1);
        ctx.lineTo(p[k].x2, p[k].y2);
        ctx.stroke();
      });

      // Gun barrel on arm-r (host only, arm still attached)
      if (this.isHost && !this.dropped.has('arm-r')) {
        const arm = p['arm-r'];
        const dx  = arm.x2 - arm.x1, dy = arm.y2 - arm.y1;
        const d   = Math.hypot(dx, dy) || 1;
        const nx  = dx / d, ny = dy / d;
        ctx.save();
        ctx.strokeStyle = '#333';
        ctx.lineWidth   = 5;
        ctx.lineCap     = 'square';
        ctx.beginPath();
        ctx.moveTo(arm.x2, arm.y2);
        ctx.lineTo(arm.x2 + nx * 10, arm.y2 + ny * 10);
        ctx.stroke();
        ctx.restore();
      }

      // Muzzle flash
      if (this.muzzleFlash) {
        const mf  = this.muzzleFlash;
        const age = mf.elapsed / mf.duration;
        ctx.save();
        ctx.globalAlpha = 1 - age;
        ctx.fillStyle   = '#FFE600';
        ctx.beginPath();
        ctx.arc(mf.x, mf.y, (1 - age) * 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      // Head
      if (!this.dropped.has('head')) {
        ctx.beginPath();
        ctx.arc(p.head.cx, p.head.cy, p.head.r, 0, Math.PI * 2);
        ctx.fillStyle = fill;
        ctx.fill();
        ctx.stroke();
      }

      // Physics limbs
      Object.entries(this.physBodies).forEach(([k, b]) => {
        ctx.save();
        if (k === 'head') {
          ctx.beginPath();
          ctx.arc(b.position.x, b.position.y, 10, 0, Math.PI * 2);
          ctx.fillStyle   = '#f0ede4';
          ctx.fill();
          ctx.strokeStyle = '#1a1a1a';
          ctx.lineWidth   = 3;
          ctx.stroke();
        } else {
          const half = (b.limbLength || 18) / 2;
          const cos  = Math.cos(b.angle), sin = Math.sin(b.angle);
          ctx.beginPath();
          ctx.moveTo(b.position.x - cos * half, b.position.y - sin * half);
          ctx.lineTo(b.position.x + cos * half, b.position.y + sin * half);
          ctx.strokeStyle = '#1a1a1a';
          ctx.lineWidth   = 3;
          ctx.lineCap     = 'round';
          ctx.stroke();
        }
        ctx.restore();
      });

      // Label
      ctx.font      = 'bold 10px Courier New';
      ctx.fillStyle = '#1a1a1a';
      ctx.textAlign = 'center';
      ctx.fillText(this.name + (this.isHost ? ' ★' : ''), this.baseX, FLOOR_Y + 20);
      ctx.restore();
    };

    // ── Figures ────────────────────────────────────────────────────────────────
    const figs = [
      new Figure(175, 'ABHI', true),
      new Figure(350, 'SAM',  false),
      new Figure(525, 'MIA',  false),
    ];

    // ── Bullets + impacts ─────────────────────────────────────────────────────
    const bullets = [];
    const impacts = [];

    // ── Shoot queue ────────────────────────────────────────────────────────────
    let shootQueue = [];
    let shootBusy  = false;

    function queueShot(fig) {
      shootQueue.push(fig);
      if (!shootBusy) drainQueue();
    }

    function drainQueue() {
      if (!shootQueue.length) { shootBusy = false; return; }
      shootBusy = true;
      const target = shootQueue.shift();
      const host   = figs.find(f => f.isHost);
      if (host) fireAt(host, target);
      else drainQueue();
    }

    function fireAt(host, target) {
      // Determine aim point: next limb to be dropped on the target
      const avail = LIMB_KEYS.filter(k => !target.dropped.has(k));
      if (!avail.length) { setTimeout(drainQueue, 100); return; }

      const nextKey = avail[0];
      const tp = target.getPose();
      let tx, ty;
      if (nextKey === 'head') {
        tx = tp.head.cx; ty = tp.head.cy;
      } else {
        tx = (tp[nextKey].x1 + tp[nextKey].x2) / 2;
        ty = (tp[nextKey].y1 + tp[nextKey].y2) / 2;
      }

      // Aim host arm then re-read pose to get aimed gun tip
      host.aimAt(tx, ty, 650);
      const hp  = host.getPose();
      const arm = hp['arm-r'];

      // Gun tip = arm tip + barrel extension
      const dx = arm.x2 - arm.x1, dy = arm.y2 - arm.y1;
      const d  = Math.hypot(dx, dy) || 1;
      const nx = dx / d, ny = dy / d;
      const gx = arm.x2 + nx * 10;
      const gy = arm.y2 + ny * 10;

      host.muzzleFlash = { x: gx, y: gy, elapsed: 0, duration: 130 };

      // Direction from gun tip to target
      const bx = tx - gx, by = ty - gy;
      const bd = Math.hypot(bx, by) || 1;

      bullets.push({
        x: gx, y: gy,
        nx: bx / bd, ny: by / bd,
        speed: 560,
        target,
        nextKey,
        tx, ty,
        traveled: 0,
        maxDist: bd + 20,
        done: false,
      });
    }

    // ── Render loop ────────────────────────────────────────────────────────────
    let last = performance.now();
    (function loop(now) {
      const dt = Math.min((now - last) / 1000, 0.05);
      last = now;

      ctx.clearRect(0, 0, W, H);

      ctx.fillStyle = '#d8d4c8';
      ctx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
      ctx.fillStyle = '#a09890';
      ctx.fillRect(0, FLOOR_Y, W, 2);

      figs.forEach(f => { f.update(dt); f.draw(ctx); });

      // Bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        if (b.done) { bullets.splice(i, 1); continue; }

        const step = b.speed * dt;
        b.x        += b.nx * step;
        b.y        += b.ny * step;
        b.traveled += step;

        const hit = Math.hypot(b.tx - b.x, b.ty - b.y) < 10 || b.traveled >= b.maxDist;
        if (hit) {
          b.done = true;
          b.target.dropLimb(b.nextKey);
          b.target.hitFlash = { elapsed: 0, duration: 200 };
          impacts.push({ x: b.tx, y: b.ty, elapsed: 0, duration: 350 });
          setTimeout(drainQueue, 320);
        }
      }

      // Draw bullets
      bullets.forEach(b => {
        ctx.save();
        ctx.strokeStyle = '#c00';
        ctx.lineWidth   = 2;
        ctx.lineCap     = 'round';
        ctx.beginPath();
        ctx.moveTo(b.x - b.nx * 12, b.y - b.ny * 12);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
        ctx.fillStyle = '#ff2200';
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      // Impact bursts
      for (let i = impacts.length - 1; i >= 0; i--) {
        const imp = impacts[i];
        imp.elapsed += dt * 1000;
        if (imp.elapsed >= imp.duration) { impacts.splice(i, 1); continue; }

        const age   = imp.elapsed / imp.duration;
        const sz    = age * 20;
        const alpha = 1 - age;
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#FFE600';
        ctx.lineWidth   = 2.5;
        for (let a = 0; a < 6; a++) {
          const angle = (a / 6) * Math.PI * 2 + age * 0.5;
          ctx.beginPath();
          ctx.moveTo(imp.x + Math.cos(angle) * sz * 0.3, imp.y + Math.sin(angle) * sz * 0.3);
          ctx.lineTo(imp.x + Math.cos(angle) * sz,       imp.y + Math.sin(angle) * sz);
          ctx.stroke();
        }
        ctx.restore();
      }

      requestAnimationFrame(loop);
    })(last);

    // ── Controls ──────────────────────────────────────────────────────────────
    document.getElementById('btnHitSelf').onclick = () => queueShot(figs[0]);
    document.getElementById('btnHitSam').onclick  = () => queueShot(figs[1]);
    document.getElementById('btnHitMia').onclick  = () => queueShot(figs[2]);
    document.getElementById('btnHitAll').onclick  = () => figs.forEach(f => queueShot(f));
    document.getElementById('btnReact').onclick   = () => figs.forEach(f => f.react());
    document.getElementById('btnReset').onclick   = () => {
      figs.forEach(f => f.reset());
      bullets.length = 0;
      impacts.length = 0;
      shootQueue     = [];
      shootBusy      = false;
      World.clear(engine.world, true);
    };
  })();
  </script>
</body>
</html>
